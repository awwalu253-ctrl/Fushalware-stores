{% extends "base.html" %}

{% block title %}All Products - Golden Kitchen Nigeria{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="text-center mb-4">All Products</h1>
    
    <div class="row">
        {% for product in products %}
        <div class="col-md-3">
            <div class="product-card">
                <div class="product-image">
                    <i class="fas fa-{{ product.image }} fa-3x"></i>
                </div>
                <div class="p-3">
                    <h5>{{ product.name }}</h5>
                    <p class="text-muted">{{ product.description[:50] }}</p>
                    <p class="fw-bold text-terracotta fs-4">₦{{ "{:,.0f}".format(product.price) }}</p>
                    <button class="btn btn-terracotta w-100" onclick="addToCart({{ product.id }})">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
