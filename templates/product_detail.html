{% extends "base.html" %}

{% block title %}{{ product.name }} - Golden Kitchen Nigeria{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-6">
            <div class="product-image" style="height: 400px;">
                <i class="fas fa-{{ product.image }} fa-5x"></i>
            </div>
        </div>
        <div class="col-md-6">
            <h1>{{ product.name }}</h1>
            <p class="lead">{{ product.description }}</p>
            <p class="fw-bold text-terracotta fs-2">₦{{ "{:,.0f}".format(product.price) }}</p>
            <button class="btn btn-terracotta btn-lg" onclick="addToCart({{ product.id }})">
                <i class="fas fa-shopping-cart"></i> Add to Cart
            </button>
            <a href="/products" class="btn btn-outline-secondary btn-lg">Continue Shopping</a>
        </div>
    </div>
</div>
{% endblock %}
