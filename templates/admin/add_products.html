{% extends "base.html" %}

{% block title %}Add Product - Admin{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">Add New Product</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Product Name *</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Category *</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            <option>Knives</option>
                            <option>Pans</option>
                            <option>Pots</option>
                            <option>Utensils</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Price (₦) *</label>
                        <input type="number" name="price" class="form-control" step="100" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Compare Price (Optional)</label>
                        <input type="number" name="compare_price" class="form-control" step="100">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" name="stock" class="form-control" required value="0">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Icon/Image</label>
                        <select name="image" class="form-select">
                            <option value="knife">Knife</option>
                            <option value="pan">Pan</option>
                            <option value="pot">Pot</option>
                            <option value="utensil">Utensil</option>
                            <option value="cup">Cup / Measuring</option>
                            <option value="cutting-board">Cutting Board</option>
                        </select>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Description *</label>
                        <textarea name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="col-md-12 mb-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="featured" id="featured">
                            <label class="form-check-label">Featured Product</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="bestseller" id="bestseller">
                            <label class="form-check-label">Best Seller</label>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <a href="/admin/products" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-terracotta">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
