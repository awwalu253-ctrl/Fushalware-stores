{% extends "base.html" %}

{% block title %}My Profile - Golden Kitchen Nigeria{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-4">
                    <i class="fas fa-user-circle fa-5x mb-3" style="color: #E67E22;"></i>
                    <h5>{{ user.name if user else session.user_name }}</h5>
                    <p class="text-muted">{{ session.user }}</p>
                    <a href="/orders" class="btn btn-outline-terracotta btn-sm">
                        <i class="fas fa-box me-2"></i> My Orders
                    </a>
                    <a href="/wishlist" class="btn btn-outline-terracotta btn-sm mt-2">
                        <i class="fas fa-heart me-2"></i> Wishlist
                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Profile Information</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ user.name if user else '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" value="{{ session.user }}" disabled>
                            <small class="text-muted">Email cannot be changed</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ user.phone if user else '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Delivery Address</label>
                            <textarea name="address" class="form-control" rows="3">{{ user.address if user else '' }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-terracotta">
                            <i class="fas fa-save me-2"></i> Update Profile
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
