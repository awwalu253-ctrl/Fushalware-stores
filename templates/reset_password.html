{% extends "base.html" %}

{% block title %}Reset Password - Golden Kitchen Nigeria{% endblock %}

{% block content %}
<section style="position: relative; min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 60px 0; overflow: hidden;">
    <!-- Video Background -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
        <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; opacity: 0.3;">
            <source src="https://cdn.pixabay.com/video/2023/02/01/148481-791778886_large.mp4" type="video/mp4">
        </video>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,248,240,0.9));"></div>
    </div>
    
    <div class="container" style="position: relative; z-index: 2;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5" data-aos="fade-up">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div style="background: linear-gradient(135deg, var(--dark), #2D2D2D); padding: 30px; text-align: center;">
                        <div style="width: 70px; height: 70px; background: rgba(198,164,63,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                            <i class="fas fa-lock fa-2x" style="color: var(--primary);"></i>
                        </div>
                        <h3 style="color: white; margin-bottom: 5px; font-family: 'Cormorant Garamond', serif;">Reset Password</h3>
                        <p style="color: rgba(255,255,255,0.7); margin-bottom: 0;">Create a new secure password</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <form method="POST" id="resetForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background: var(--gray-light); border-right: none;">
                                        <i class="fas fa-lock" style="color: var(--primary);"></i>
                                    </span>
                                    <input type="password" name="password" class="form-control" id="password" required style="border-left: none;">
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')" style="border-left: none;">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                
                                <!-- Password Strength Meter -->
                                <div class="mt-2">
                                    <div class="progress" style="height: 4px;">
                                        <div id="passwordStrength" class="progress-bar" style="width: 0%;"></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-1">
                                        <small id="strengthText" class="text-muted">Password strength</small>
                                        <small id="strengthStatus" class="text-muted"></small>
                                    </div>
                                </div>
                                
                                <!-- Password Requirements -->
                                <div class="password-requirements mt-2" style="font-size: 0.7rem;">
                                    <div><i class="fas fa-circle" style="font-size: 6px; vertical-align: middle;" id="reqLength"></i> <span class="text-muted">At least 6 characters</span></div>
                                    <div><i class="fas fa-circle" style="font-size: 6px; vertical-align: middle;" id="reqUpper"></i> <span class="text-muted">Uppercase letter</span></div>
                                    <div><i class="fas fa-circle" style="font-size: 6px; vertical-align: middle;" id="reqNumber"></i> <span class="text-muted">Number</span></div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background: var(--gray-light); border-right: none;">
                                        <i class="fas fa-check-circle" style="color: var(--primary);"></i>
                                    </span>
                                    <input type="password" name="confirm_password" class="form-control" id="confirmPassword" required style="border-left: none;">
                                </div>
                                <div id="passwordMatch" class="small mt-1"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary-custom w-100 py-3" style="font-weight: 600;">
                                <i class="fas fa-save me-2"></i>Reset Password
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <p class="text-center mb-0">
                            <a href="/login" class="fw-bold" style="color: var(--primary); text-decoration: none;">
                                <i class="fas fa-arrow-left me-1"></i>Back to Login
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .password-requirements div {
        margin-bottom: 3px;
    }
    
    .password-requirements .fas.fa-check-circle {
        color: #2D6A4F;
    }
    
    .password-requirements .fas.fa-circle {
        color: var(--gray);
    }
</style>

<script>
function togglePassword(fieldId) {
    const password = document.getElementById(fieldId);
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
}

// Password strength meter
document.getElementById('password')?.addEventListener('input', function() {
    const password = this.value;
    let strength = 0;
    let requirements = {
        length: password.length >= 6,
        upper: /[A-Z]/.test(password),
        number: /[0-9]/.test(password)
    };
    
    if (requirements.length) strength += 30;
    if (requirements.upper) strength += 35;
    if (requirements.number) strength += 35;
    
    // Update requirement indicators
    document.getElementById('reqLength').className = requirements.length ? 'fas fa-check-circle' : 'fas fa-circle';
    document.getElementById('reqUpper').className = requirements.upper ? 'fas fa-check-circle' : 'fas fa-circle';
    document.getElementById('reqNumber').className = requirements.number ? 'fas fa-check-circle' : 'fas fa-circle';
    
    if (requirements.length) document.getElementById('reqLength').style.color = '#2D6A4F';
    if (requirements.upper) document.getElementById('reqUpper').style.color = '#2D6A4F';
    if (requirements.number) document.getElementById('reqNumber').style.color = '#2D6A4F';
    
    const strengthBar = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');
    const strengthStatus = document.getElementById('strengthStatus');
    
    strengthBar.style.width = strength + '%';
    
    if (strength < 40) {
        strengthBar.className = 'progress-bar bg-danger';
        strengthText.innerHTML = 'Weak password';
        strengthStatus.innerHTML = '⚠️ Too weak';
        strengthStatus.style.color = '#dc3545';
    } else if (strength < 70) {
        strengthBar.className = 'progress-bar bg-warning';
        strengthText.innerHTML = 'Medium password';
        strengthStatus.innerHTML = '👍 Getting there';
        strengthStatus.style.color = '#ffc107';
    } else {
        strengthBar.className = 'progress-bar bg-success';
        strengthText.innerHTML = 'Strong password';
        strengthStatus.innerHTML = '✅ Strong!';
        strengthStatus.style.color = '#2D6A4F';
    }
});

// Password confirmation check
document.getElementById('confirmPassword')?.addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirm = this.value;
    const matchDiv = document.getElementById('passwordMatch');
    
    if (confirm.length > 0) {
        if (password === confirm) {
            matchDiv.innerHTML = '<i class="fas fa-check-circle" style="color: #2D6A4F;"></i> Passwords match';
            matchDiv.style.color = '#2D6A4F';
        } else {
            matchDiv.innerHTML = '<i class="fas fa-times-circle" style="color: #dc3545;"></i> Passwords do not match';
            matchDiv.style.color = '#dc3545';
        }
    } else {
        matchDiv.innerHTML = '';
    }
});

// Form validation
document.getElementById('resetForm')?.addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    
    if (password !== confirm) {
        e.preventDefault();
        showFlash('Passwords do not match', 'danger');
        return;
    }
    
    if (password.length < 6) {
        e.preventDefault();
        showFlash('Password must be at least 6 characters', 'danger');
        return;
    }
    
    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Resetting password...';
});
</script>
{% endblock %}
